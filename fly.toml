# fly.toml app configuration file generated for perumda-ledger-scs9va on 2026-05-20T04:13:30Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'perumda-ledger-scs9va'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'
  DB_PATH = '/app/data/perumda_ledger.db'

[[mounts]]
  source = 'sqlite_data'
  destination = '/app/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
